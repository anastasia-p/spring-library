<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/bottom-nav.css">
    <link rel="stylesheet" href="css/sort.css">
    <script type="module" src="js/header.js"></script>
    <script type="module" src="js/auth-overlay.js"></script>
    <script type="module" src="js/bottom-nav.js"></script>
</head>
<body>
    <header class="page-header" id="page-header" data-cta="add"></header>

    <main class="page-content page">
        <section class="tab-section tab-section--active" data-section="videos">
            <div id="videos-loading" class="loading-state">Загружаем…</div>

            <div id="videos-total" class="videos-total" hidden></div>

            <div id="folders-section" hidden>
                <div class="section-title">Папки</div>
                <div id="folders-list" class="video-list"></div>
            </div>

            <div id="standalone-section" hidden>
                <div class="section-row">
                    <div class="section-title">Видео</div>
                    <div id="standalone-sort"></div>
                </div>
                <div id="standalone-list" class="video-list"></div>
            </div>

            <div id="videos-empty" class="empty-state" hidden>Пока нет ни одного видео.</div>
            <div id="videos-error" class="error-state" hidden></div>
        </section>

        <section class="tab-section" data-section="books">
            <div class="stub">
                <div class="stub__icon">📚</div>
                <div>Раздел Книг скоро появится.</div>
            </div>
        </section>

        <section class="tab-section" data-section="films">
            <div class="stub">
                <div class="stub__icon">🎞</div>
                <div>Раздел Фильмов скоро появится.</div>
            </div>
        </section>
    </main>

    <script type="module" src="js/index.js"></script>
</body>
</html>
