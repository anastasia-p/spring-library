<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/bottom-nav.css">
    <link rel="stylesheet" href="css/sort.css">
    <script type="module" src="js/header.js"></script>
    <script type="module" src="js/auth-overlay.js"></script>
    <script type="module" src="js/bottom-nav.js"></script>
</head>
<body>
    <header class="page-header" id="page-header" data-active-tab="videos" data-cta="add"></header>

    <main class="page-content page">
        <div class="page-nav">
            <div class="page-title-row">
                <h2 class="page-title" id="folder-title">📁 Папка</h2>
                <div id="folder-sort"></div>
            </div>
            <div class="page-subtitle" id="folder-meta"></div>
        </div>

        <div id="loading-state" class="loading-state">Загружаем…</div>
        <div id="video-list" class="video-list"></div>
        <div id="empty-state" class="empty-state" hidden>В этой папке пока нет видео.</div>
        <div id="error-state" class="error-state" hidden></div>
    </main>

    <script type="module" src="js/folder.js"></script>
</body>
</html>
